<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIS Multimedia Map</title>

    ium.com/downloads/cesiumjs/releases/1.133/Build/Cesium/Cesium.js"></script>

    cesium.com/downloads/cesiumjs/releases/1.133/Build/Cesium/Widgets/widgets.css"
        rel="stylesheet"
    />

    <style>
        html, body, #cesiumContainer {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        #toolbar {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 8px;
            max-width: 300px;
        }

        input, textarea {
            width: 100%;
            margin-bottom: 5px;
        }

        button {
            width: 100%;
            padding: 8px;
            background: #0078D7;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #005fa3;
        }
    </style>
</head>

<body>

<div id="toolbar">
    <h3>Add Location</h3>

    <input id="title" type="text" placeholder="Title">

    <textarea id="description"
        placeholder="Description"></textarea>

    <input id="imageUrl"
        type="text"
        placeholder="Image URL">

    <input id="videoUrl"
        type="text"
        placeholder="YouTube Embed URL">

    <button id="activate">
        Click Map To Add Marker
    </button>
</div>

<div id="cesiumContainer"></div>

<script>

Cesium.Ion.defaultAccessToken = "";

const viewer = new Cesium.Viewer("cesiumContainer", {
    terrain: Cesium.Terrain.fromWorldTerrain()
});

viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(
        21.616,
        63.095,
        15000
    )
});

let addMode = false;

document.getElementById("activate")
.addEventListener("click", () => {

    addMode = true;

    alert(
        "Click on the map to place a marker."
    );
});

const handler =
new Cesium.ScreenSpaceEventHandler(
    viewer.scene.canvas
);

handler.setInputAction(function(click){

    if(!addMode) return;

    const position =
    viewer.scene.pickPosition(
        click.position
    );

    if(!position) return;

    const cartographic =
    Cesium.Cartographic.fromCartesian(
        position
    );

    const lon =
    Cesium.Math.toDegrees(
        cartographic.longitude
    );

    const lat =
    Cesium.Math.toDegrees(
        cartographic.latitude
    );

    const title =
        document.getElementById("title").value;

    const desc =
        document.getElementById("description").value;

    const image =
        document.getElementById("imageUrl").value;

    const video =
        document.getElementById("videoUrl").value;

    viewer.entities.add({

        position:
            Cesium.Cartesian3.fromDegrees(
                lon,
                lat
            ),

        point: {
            pixelSize: 12,
            color: Cesium.Color.RED
        },

        label: {
            text: title,
            pixelOffset:
            new Cesium.Cartesian2(
                0,
                -25
            )
        },

        description: `

            <h2>${title}</h2>

            <p>${desc}</p>

            ${
                image
                ? `${image}`
                : ''
            }

            <br><br>

            ${
                video
                ? `
                ${video}
                </iframe>
                `
                : ''
            }

            <hr>

            <b>Latitude:</b>
            ${lat.toFixed(6)}

            <br>

            <b>Longitude:</b>
            ${lon.toFixed(6)}

        `
    });

    addMode = false;

},
Cesium.ScreenSpaceEventType.LEFT_CLICK);

</script>

</body>
</html>
