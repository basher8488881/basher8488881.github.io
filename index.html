<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GIS Multimedia Map</title>

cesiumjs/releases/1.133/Build/Cesium/Widgets/widgets.css"
    rel="stylesheet">

<style>
html, body, #cesiumContainer {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
}

#panel {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 999;
    background: white;
    padding: 10px;
    border-radius: 8px;
    width: 280px;
}

input, textarea {
    width: 100%;
    margin-bottom: 5px;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 8px;
    background: #0078d7;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background: #005ea2;
}
</style>
</head>

<body>

<div id="panel">
    <h3>Add Marker</h3>

    <input id="title" placeholder="Title">

    <textarea id="description"
        placeholder="Description"></textarea>

    <input id="image"
        placeholder="Image URL">

    <input id="video"
        placeholder="YouTube Embed URL">

    <button id="addButton">
        Enable Add Marker
    </button>
</div>

<div id="cesiumContainer"></div>

<script>

const viewer = new Cesium.Viewer("cesiumContainer", {
    animation: false,
    timeline: false,
    baseLayerPicker: true
});

let addMode = false;

document.getElementById("addButton")
.addEventListener("click", function() {

    addMode = true;

    alert("Now click anywhere on the globe.");
});

const handler =
new Cesium.ScreenSpaceEventHandler(
    viewer.scene.canvas
);

handler.setInputAction(function(click) {

    if (!addMode) return;

    const ellipsoid =
        viewer.scene.globe.ellipsoid;

    const cartesian =
        viewer.camera.pickEllipsoid(
            click.position,
            ellipsoid
        );

    if (!cartesian) {
        alert("Please click directly on the globe.");
        return;
    }

    const cartographic =
        Cesium.Cartographic.fromCartesian(
            cartesian
        );

    const longitude =
        Cesium.Math.toDegrees(
            cartographic.longitude
        );

    const latitude =
        Cesium.Math.toDegrees(
            cartographic.latitude
        );

    const title =
        document.getElementById("title").value;

    const description =
        document.getElementById("description").value;

    const image =
        document.getElementById("image").value;

    const video =
        document.getElementById("video").value;

    let popup = `
        <h2>${title}</h2>
        <p>${description}</p>
    `;

    if (image) {
        popup += `
        ${image}
        `;
    }

    if (video) {
        popup += `
        <br><br>
        ${video}
        </iframe>
        `;
    }

    viewer.entities.add({

        position:
            Cesium.Cartesian3.fromDegrees(
                longitude,
                latitude
            ),

        point: {
            pixelSize: 12,
            color: Cesium.Color.RED
        },

        label: {
            text: title || "Marker",
            pixelOffset:
                new Cesium.Cartesian2(
                    0,
                    -25
                )
        },

        description: popup
    });

    addMode = false;

    alert("Marker added!");

},
Cesium.ScreenSpaceEventType.LEFT_CLICK);

viewer.camera.flyTo({
    destination:
        Cesium.Cartesian3.fromDegrees(
            21.616,
            63.095,
            3000000
        )
});

</script>

</body>
</html>
